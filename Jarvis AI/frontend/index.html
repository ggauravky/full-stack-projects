<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JarvisLite - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-mesh">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="assistant-info">
                <div class="ai-orb" id="status-indicator">
                    <div class="inner-core"></div>
                    <div class="outer-ring"></div>
                    <div class="outer-ring ring-2"></div>
                </div>
                <div class="details">
                    <h1>JarvisLite</h1>
                    <span class="status-text" id="connection-status">Connecting...</span>
                </div>
            </div>
            <div class="actions">
                <button id="theme-toggle" title="Toggle Theme"><i class="fa-solid fa-moon"></i></button>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-box" id="chat-box">
            <!-- Messages will be injected here -->
            <div class="message system startup">
                Initializing JarvisLite systems...
            </div>
        </main>

        <!-- Input Area -->
        <footer class="chat-input-area">
            <!-- Image Preview Box -->
            <div id="image-preview-container" class="image-preview-hidden">
                <img id="image-preview" src="" alt="Selected image">
                <button type="button" id="clear-image-btn"><i class="fa-solid fa-times"></i></button>
            </div>

            <form id="chat-form" class="input-form">
                <button type="button" id="mic-btn" class="icon-btn mic-btn" title="Hold to speak">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Type a message, command, or upload an image..."
                        autocomplete="off">
                </div>
                <input type="file" id="image-upload" accept="image/*" style="display: none;">
                <button type="button" id="upload-btn" class="icon-btn action-btn" title="Upload Image">
                    <i class="fa-solid fa-image"></i>
                </button>
                <button type="submit" id="send-btn" class="icon-btn send-btn" title="Send message">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
            <div class="recording-indicator hidden" id="recording-toast">
                <span class="pulse"></span> Listening...
            </div>
        </footer>
    </div>

    <!-- Marked.js for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
